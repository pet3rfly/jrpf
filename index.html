<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮卡皮啦 - 业务终端</title>
    <style>
        :root {
            /* 核心蓝色主题变量 */
            --theme-blue-dark: #1e3a8a;   /* 侧边栏深蓝 */
            --theme-blue-main: #2563eb;   /* 主题亮蓝 */
            --theme-blue-hover: #1e40af;  /* 侧边栏悬停蓝 */
            --theme-blue-light: #eff6ff;  /* 浅蓝背景 */
            
            --sidebar-width: 240px;
            --bg-color: #f1f5f9;
        }

        body {
            margin: 0; padding: 0;
            display: flex; height: 100vh;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* === 左侧边栏 (深蓝主题) === */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--theme-blue-dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .logo-area {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(0,0,0,0.15);
        }
        .logo-area h2 { margin: 0; font-size: 20px; letter-spacing: 2px; }
        .logo-area p { margin: 5px 0 0 0; font-size: 12px; color: #93c5fd; }

        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin: 0;
        }

        .menu-group-title {
            padding: 15px 20px 8px 20px;
            font-size: 12px;
            color: #60a5fa;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            color: #cbd5e1;
            text-decoration: none;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .menu-item:hover {
            background-color: var(--theme-blue-hover);
            color: #fff;
        }

        .menu-item.active {
            background-color: var(--theme-blue-main);
            border-left-color: #60a5fa;
            color: #fff;
            font-weight: bold;
        }

        /* 圆形小图标设定 */
        .menu-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%; /* 强制圆形 */
            object-fit: cover;
            background-color: #fff; /* 防止透明PNG在深色背景下看不清 */
            margin-right: 12px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* 结清证明空缺提示 */
        .menu-empty {
            padding: 10px 20px;
            font-size: 12px;
            color: #475569;
            font-style: italic;
        }

        /* === 右侧主工作区 === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            height: 54px;
            background-color: #fff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            z-index: 5;
        }

        .top-bar-title { 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--theme-blue-dark); 
        }

        /* iframe 画框 */
        #content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background-color: var(--bg-color);
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <h2>皮卡皮啦</h2>
            <p>效率终端 V1.0</p>
        </div>
        
        <div class="menu-list">
            
            <div class="menu-group-title">批复通知</div>
            <a class="menu-item active" href="pages/zhongguoyinhang.html" target="main_frame" onclick="setActive(this, '中国银行 - 批复通知')">
                <img src="images/中行logo.png" class="menu-icon" alt="中行" onerror="fallbackIcon(this)">
                <span>中国银行</span>
            </a>
            <a class="menu-item" href="pages/jiansheyinhang.html" target="main_frame" onclick="setActive(this, '建设银行 - 批复通知')">
                <img src="images/建行logo.png" class="menu-icon" alt="建行" onerror="fallbackIcon(this)">
                <span>建设银行</span>
            </a>
            <a class="menu-item" href="pages/nongyeyinhang.html" target="main_frame" onclick="setActive(this, '农业银行 - 批复通知')">
                <img src="images/农行logo.png" class="menu-icon" alt="农行" onerror="fallbackIcon(this)">
                <span>农业银行</span>
            </a>
            <a class="menu-item" href="pages/pufayinhang.html" target="main_frame" onclick="setActive(this, '浦发银行 - 批复通知')">
                <img src="images/浦发logo.png" class="menu-icon" alt="浦发" onerror="fallbackIcon(this)">
                <span>浦发银行</span>
            </a>

            <div class="menu-group-title">信息查询</div>
            <a class="menu-item" href="pages/hefeibudongchan.html" target="main_frame" onclick="setActive(this, '合肥不动产查询')">
                <img src="images/hfbdclogo.png" class="menu-icon" alt="不动产" onerror="fallbackIcon(this)">
                <span>合肥不动产查询</span>
            </a>

            <div class="menu-group-title">结清证明</div>
            <div class="menu-empty">（开发中...）</div>

            <div class="menu-group-title">小工具</div>
            <a class="menu-item" href="pages/suijishu.html" target="main_frame" onclick="setActive(this, '小工具 - 随机数生成')">
                <img src="images/suijishu.png" class="menu-icon" alt="随机数" onerror="fallbackIcon(this)">
                <span>随机数</span>
            </a>
            <a class="menu-item" href="pages/printer.html" target="main_frame" onclick="setActive(this, '小工具 - 扫描模拟器')">
                <img src="images/saomiao.png" class="menu-icon" alt="扫描" onerror="fallbackIcon(this)">
                <span>扫描模拟器</span>
            </a>

        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <span class="top-bar-title" id="current-title">中国银行 - 批复通知</span>
        </div>
        
        <iframe id="content-frame" name="main_frame" src="pages/zhongguoyinhang.html"></iframe>
    </div>

    <script>
        // 菜单点击高亮与顶部标题联动逻辑
        function setActive(element, title) {
            // 移除所有激活状态
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            // 添加当前激活状态
            element.classList.add('active');
            // 更新顶部标题
            document.getElementById('current-title').innerText = title;
        }

        // 图标加载失败时的容错处理（防止图片缺失时显示丑陋的裂图）
        function fallbackIcon(img) {
            img.onerror = null; // 防止死循环
            // 替换为一个通用的蓝色圆形底图作为默认图标
            img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%232563eb"><circle cx="12" cy="12" r="10"/></svg>';
        }
    </script>

</body>
</html>
